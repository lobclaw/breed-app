<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幼犬体重记录 — 快速监测日志</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: #f0eaec;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  min-height: 100vh;
}

.phone-frame {
  width: 375px;
  height: 812px;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
}

.phone-screen {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.phone-screen::-webkit-scrollbar { display: none; }

/* ==================== LIGHT MODE ==================== */
.light {
  --primary: #ea3e77;
  --primary-soft: #fff0f2;
  --bg: #fdf8f9;
  --card: #FFFFFF;
  --card-dim: #FFF0E8;
  --text-1: #1a1a2e;
  --text-2: #8B7355;
  --text-3: #B8A08A;
  --text-4: #D8CBBD;
  --amber: #e89b3e;
  --amber-soft: #fff9f0;
  --red: #e05252;
  --red-soft: #fff0f0;
  --green: #3dae6f;
  --green-soft: #f0fff4;
  --blue: #4a8dd4;
  --blue-soft: #f0f7ff;
  --plum: #8668b0;
  --plum-soft: #f5f0ff;
  --rose: #ea3e77;
  --rose-soft: #fff0f2;
  --teal: #3da8a0;
  --teal-soft: #f0fffe;
  --shadow: 0 2px 12px rgba(234, 62, 119, 0.06);
  --shadow-lg: 0 6px 24px rgba(234, 62, 119, 0.1);
  --nav-bg: rgba(255,255,255,0.85);
  --nav-border: rgba(234, 62, 119, 0.08);
  background: var(--bg);
}

/* ==================== STATUS BAR ==================== */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 28px 0;
  height: 50px;
  color: var(--text-1);
  font-size: 15px;
  font-weight: 600;
}
.status-bar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-bar-right .material-icons-round { font-size: 16px; }

/* ==================== TOP BAR ==================== */
.top-bar {
  padding: 8px 20px 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--text-1);
  cursor: pointer;
  padding: 4px 0 0 0;
  display: flex;
  align-items: center;
  transition: transform 0.12s ease;
}
.back-btn:active { transform: scale(0.85); }
.back-btn .material-icons-round { font-size: 24px; }
.top-bar-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.top-bar-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.3;
}
.top-bar-subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-3);
  line-height: 1.3;
}

/* ==================== CONTENT ==================== */
.content {
  padding: 0 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ==================== SECTION LABEL ==================== */
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-label.teal::before { background: var(--teal); }
.section-label.rose::before { background: var(--rose); }

/* ==================== LITTER SUMMARY CARD ==================== */
.litter-card {
  background: var(--card);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  overflow: hidden;
}
.litter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--rose-soft) 0%, transparent 40%);
  border-radius: 16px;
  pointer-events: none;
}
.litter-card > * { position: relative; z-index: 1; }
.litter-card:active { transform: scale(0.975); box-shadow: 0 1px 6px rgba(234,62,119,0.04); }
.litter-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.litter-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ea3e77, #e89b3e);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.litter-avatar .material-icons-round { font-size: 22px; color: #fff; }
.litter-detail { display: flex; flex-direction: column; gap: 2px; }
.litter-name { font-size: 15px; font-weight: 700; color: var(--text-1); }
.litter-meta { font-size: 12px; font-weight: 500; color: var(--text-3); }
.litter-card .chevron {
  color: var(--text-4);
  font-size: 20px;
}

/* ==================== PUPPY WEIGHT CARD ==================== */
.puppy-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 16px 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  border-left: 3.5px solid var(--blue);
  animation: fadeInUp 0.35s ease both;
}
.puppy-card.male { border-left-color: var(--blue); }
.puppy-card.female { border-left-color: var(--rose); }

.puppy-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.puppy-card.male::before {
  background: linear-gradient(135deg, var(--blue-soft) 0%, transparent 40%);
}
.puppy-card.female::before {
  background: linear-gradient(135deg, var(--rose-soft) 0%, transparent 40%);
}
.puppy-card > * { position: relative; z-index: 1; }

.puppy-card:nth-child(2) { animation-delay: 0.05s; }
.puppy-card:nth-child(3) { animation-delay: 0.10s; }
.puppy-card:nth-child(4) { animation-delay: 0.15s; }
.puppy-card:nth-child(5) { animation-delay: 0.20s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.puppy-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.puppy-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
}
.puppy-gender {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
}
.puppy-gender.male {
  background: var(--blue-soft);
  color: var(--blue);
}
.puppy-gender.female {
  background: var(--rose-soft);
  color: var(--rose);
}

.puppy-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.weight-input-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.weight-input {
  width: 72px;
  height: 48px;
  border: 1.5px solid var(--text-4);
  border-radius: 14px;
  background: var(--card);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--text-1);
  text-align: center;
  outline: none;
  caret-color: var(--primary);
  transition: border-color 0.15s ease;
}
.weight-input:focus {
  border-color: var(--primary);
}
.weight-input::placeholder {
  color: var(--text-4);
  font-weight: 600;
}
.weight-unit {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-3);
}

.weight-detail {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.weight-comparison {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-3);
}
.weight-delta {
  font-size: 13px;
  font-weight: 700;
}
.weight-delta.positive { color: var(--red); }    /* 红涨：增长=红 */
.weight-delta.negative { color: var(--green); }  /* 绿跌：下降=绿 */

.mini-trend {
  flex-shrink: 0;
  width: 60px;
  height: 30px;
}

/* ==================== SUMMARY BAR ==================== */
.summary-bar {
  background: var(--card);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  flex-wrap: wrap;
}
.summary-item {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
.summary-label {
  color: var(--text-3);
  font-weight: 500;
}
.summary-value {
  font-weight: 800;
  color: var(--text-1);
}
.summary-value.warning {
  color: var(--red);
}
.summary-divider {
  width: 1px;
  height: 14px;
  background: var(--text-4);
  flex-shrink: 0;
}

/* ==================== BOTTOM AREA ==================== */
.bottom-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 4px;
}
.save-btn {
  width: 100%;
  height: 48px;
  border-radius: 999px;
  background: var(--teal);
  color: #fff;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.12s ease;
  box-shadow: 0 4px 16px rgba(61, 168, 160, 0.25);
}
.save-btn:active {
  transform: scale(0.94);
  opacity: 0.85;
}

.time-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  cursor: pointer;
  transition: opacity 0.12s ease;
}
.time-display:active { opacity: 0.7; }
.time-display .material-icons-round {
  font-size: 14px;
}
</style>
</head>

<script>
// Auto-jump: after entering weight, press Enter or after 3 digits, jump to next input
const inputs = document.querySelectorAll('.weight-input');

inputs.forEach((input, i) => {
  // Jump on Enter key
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const next = inputs[i + 1];
      if (next) {
        next.focus();
        next.select();
      }
    }
  });

  // Auto-jump after 3 digits (typical puppy weight is 100-999g)
  input.addEventListener('input', (e) => {
    const val = e.target.value.replace(/\D/g, '');
    e.target.value = val;
    if (val.length >= 3) {
      const next = inputs[i + 1];
      if (next) {
        setTimeout(() => {
          next.focus();
          next.select();
        }, 150);
      }
    }
  });

  // Select all text on focus for easy replacement
  input.addEventListener('focus', () => {
    setTimeout(() => input.select(), 50);
  });
});
</script>

</body>
</html>
